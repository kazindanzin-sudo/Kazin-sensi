<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kazin Sensi</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ff6a00, #1c1c1c);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.app {
  background: #121212;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 0 20px black;
}
h1 {
  margin-bottom: 5px;
}
p {
  margin-top: 0;
  font-size: 14px;
  color: #ccc;
}
select, button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-top: 12px;
  font-size: 16px;
}
button {
  background: #ff6a00;
  color: white;
  font-weight: bold;
}
.resultado {
  margin-top: 15px;
  background: #1f1f1f;
  padding: 15px;
  border-radius: 15px;
  font-size: 16px;
}
.footer {
  margin-top: 10px;
  font-size: 12px;
  color: #888;
}
</style>
</head>
<body>
<div class="app">
  <h1>Kazin Sensi</h1>
  <p>Gerador de Sensibilidade</p>

  <select id="jogo">
    <option value="ff">Free Fire</option>
    <option value="cod">Call of Duty</option>
    <option value="pubg">PUBG</option>
  </select>

  <select id="modelo">
    <option>Samsung</option>
    <option>Motorola</option>
    <option>Xiaomi</option>
    <option>Realme</option>
    <option>iPhone</option>
  </select>

  <button onclick="gerar()">Gerar Sensibilidade</button>

  <div class="resultado" id="resultado"></div>

  <div class="footer">Kazin Sensi ©</div>
</div>

<script>
function gerar() {
  let jogo = document.getElementById("jogo").value;
  let geral = Math.floor(Math.random() * 50) + 50;
  let mira = Math.floor(Math.random() * 40) + 40;
  let redDot = Math.floor(Math.random() * 30) + 30;

  let texto = "";

  if (jogo === "ff") {
    texto = `
    Geral: ${geral}%<br>
    Red Dot: ${redDot}%<br>
    Mira 2x: ${mira}%<br>
    Mira 4x: ${mira - 5}%<br>
    AWM: ${mira - 10}%
    `;
  }

  if (jogo === "cod") {
    texto = `
    Horizontal: ${geral}%<br>
    Vertical: ${mira}%<br>
    ADS: ${redDot}%
    `;
  }

  if (jogo === "pubg") {
    texto = `
    3ª pessoa: ${geral}%<br>
    1ª pessoa: ${mira}%<br>
    Mira: ${redDot}%
    `;
  }

  document.getElementById("resultado").innerHTML = texto;
}
</script>
</body>
  </html>
