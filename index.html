<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazin v2.0</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0a0a0a,#1c1c1c);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:30px;
font-weight:bold;
background:#ff6a00;
box-shadow:0 0 15px #ff6a00;
}

.menu{
display:flex;
justify-content:space-around;
background:#111;
padding:12px;
}

.menu button{
background:none;
border:none;
color:white;
font-weight:bold;
font-size:14px;
cursor:pointer;
}

.menu button:hover{
color:#ff6a00;
}

.container{
padding:20px;
}

.card{
background:#1a1a1a;
padding:18px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 0 10px black;
}

h2{
color:#ff6a00;
}

.sensi-box{
background:#111;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.sensi-box input{
width:100%;
}

button.apply{
margin-top:10px;
background:#ff6a00;
border:none;
padding:10px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button.apply:hover{
background:#ff8c2a;
}

footer{
text-align:center;
padding:15px;
background:#111;
margin-top:20px;
}

</style>
</head>

<body>

<header>Kazin v2.0</header>

<div class="menu">
<button>Início</button>
<button>Dicas</button>
<button>Sensi</button>
<button>Capas</button>
<button>Atualizações</button>
</div>

<div class="container">

<div class="card">
<h2>🔥 Novidades Free Fire</h2>
<p>Veja eventos novos, armas atualizadas e novidades do jogo.</p>
</div>

<div class="card">
<h2>🎯 Kazin Sensi</h2>

<div class="sensi-box">
<label>Geral</label>
<input type="range" min="0" max="100" value="95">
</div>

<div class="sensi-box">
<label>Ponto vermelho</label>
<input type="range" min="0" max="100" value="90">
</div>

<div class="sensi-box">
<label>Mira 2x</label>
<input type="range" min="0" max="100" value="85">
</div>

<div class="sensi-box">
<label>Mira 4x</label>
<input type="range" min="0" max="100" value="75">
</div>

<div class="sensi-box">
<label>AWM</label>
<input type="range" min="0" max="100" value="60">
</div>

<button class="apply" onclick="alert('Sensibilidade aplicada!')">
Aplicar Kazin Sensi
</button>

</div>

<div class="card">
<h2>💥 Dicas de capa</h2>
<ul>
<li>Puxar a mira rápido</li>
<li>Usar sensi alta</li>
<li>Treinar no modo treino</li>
<li>Usar HUD confortável</li>
</ul>
</div>

</div>

<footer>
Kazin v2.0 • Projeto inspirado em Free Fire
</footer>

</body>
</html>
