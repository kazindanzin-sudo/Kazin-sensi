<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Kazin Sensi FF</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 { color: red; }

.tab {
  display: inline-block;
  padding: 10px;
  border: 2px solid red;
  margin: 5px;
  border-radius: 8px;
  cursor: pointer;
}

.tab:hover { background: red; }

.section {
  display: none;
  border: 2px solid red;
  border-radius: 12px;
  margin: 10px;
  padding: 15px;
}

button {
  background: red;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
}

select, input {
  padding: 6px;
  border-radius: 6px;
}

.crosshair {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 30px;
  display: none;
  pointer-events: none;
}
</style>
</head>

<body>

<h1>KAZIN SENSI 🔴⚫</h1>

<div>
  <div class="tab" onclick="showTab('sensi')">Sensibilidade</div>
  <div class="tab" onclick="showTab('extra')">Extra</div>
  <div class="tab" onclick="showTab('visual')">Visual</div>
</div>

<!-- ABA SENSI -->
<div class="section" id="sensi">

<h2>Marca do celular</h2>
<select id="marca">
  <option>Samsung</option>
  <option>Xiaomi</option>
  <option>Motorola</option>
  <option>Realme</option>
  <option>Infinix</option>
  <option>Outro</option>
</select>

<h2>Nível de sensi</h2>
<select id="nivel">
  <option value="baixa">Baixa</option>
  <option value="media">Média</option>
  <option value="alta">Alta</option>
</select>

<br><br>
<button onclick="gerar()">Gerar Config</button>
<button onclick="copiar()">Copiar</button>

<p id="saida"></p>

</div>

<!-- ABA EXTRA -->
<div class="section" id="extra">
<h2>Config para rodar melhor</h2>
<p id="extraTxt"></p>
</div>

<!-- ABA VISUAL -->
<div class="section" id="visual">

<h2>Mira visual</h2>

<select onchange="changeCross(this.value)">
<option value="">Escolher mira</option>
<option>+</option>
<option>×</option>
<option>•</option>
<option>⊕</option>
<option>⌖</option>
<option>★</option>
<option>□</option>
<option>◉</option>
<option>✚</option>
</select>

<br><br>

Cor:
<input type="color" onchange="changeColor(this.value)">

<br><br>

Tamanho:
<input type="range" min="15" max="80" value="30" onchange="changeSize(this.value)">

<br><br>

<button onclick="toggle()">Mostrar / esconder mira</button>

</div>

<div class="crosshair" id="cross">+</div>

<script>
showTab("sensi");

function showTab(id) {
  document.querySelectorAll(".section").forEach(sec => sec.style.display="none");
  document.getElementById(id).style.display="block";
}

function gerar() {
  let nivel = document.getElementById("nivel").value;
  let marca = document.getElementById("marca").value;

  let texto="";
  let extra="";

  if(nivel=="baixa"){
    texto=`Marca: ${marca}<br>
Geral: 110%<br>
Red Dot: 100%<br>
2x Scope: 90%<br>
4x Scope: 80%<br>
AWM: 60%`;

    extra=`DPI: 420<br>
Botão tiro: 45%<br>
Gráfico: Suave<br>
FPS: Alto<br>
Fechar apps em segundo plano`;
  }

  if(nivel=="media"){
    texto=`Marca: ${marca}<br>
Geral: 140%<br>
Red Dot: 130%<br>
2x Scope: 120%<br>
4x Scope: 100%<br>
AWM: 80%`;

    extra=`DPI: 480<br>
Botão tiro: 55%<br>
Gráfico: Padrão<br>
FPS: Máximo<br>
Modo jogo ligado`;
  }

  if(nivel=="alta"){
    texto=`Marca: ${marca}<br>
Geral: 170%<br>
Red Dot: 160%<br>
2x Scope: 150%<br>
4x Scope: 130%<br>
AWM: 100%`;

    extra=`DPI: 540<br>
Botão tiro: 65%<br>
Gráfico: Alto<br>
FPS: Máximo<br>
Wi-fi bom`;
  }

  document.getElementById("saida").innerHTML=texto;
  document.getElementById("extraTxt").innerHTML=extra;
}

function copiar(){
  let txt=document.getElementById("saida").innerText;
  navigator.clipboard.writeText(txt);
  alert("Config copiada!");
}

const cross=document.getElementById("cross");

function changeCross(v){
  if(v==""){cross.style.display="none";}
  else{
    cross.innerText=v;
    cross.style.display="block";
  }
}
function changeColor(c){cross.style.color=c;}
function changeSize(s){cross.style.fontSize=s+"px";}
function toggle(){
  cross.style.display = cross.style.display=="none"?"block":"none";
}
</script>

</body>
</html>
